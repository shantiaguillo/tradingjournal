<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Trading Journal</title>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h1>Registro de Trading</h1>

<form id="tradeForm">

<h2>Contexto</h2>

<label>Fecha</label>
<input type="date" id="date" required>

<label>Hora</label>
<input type="time" id="time" required>

<label>Sesión</label>
<select id="session">
<option>New York</option>
<option>London</option>
<option>Asia</option>
</select>


<h2>Trade</h2>

<label>Dirección</label>
<select id="direction">
<option>Long</option>
<option>Short</option>
</select>

<label>Entry</label>
<input type="number" id="entry">

<label>Stop Loss</label>
<input type="number" id="sl">

<label>Take Profit</label>
<input type="number" id="tp">

<label>Risk %</label>
<input type="number" id="risk">


<h2>Resultado</h2>

<label>Resultado</label>
<select id="result">
<option>Win</option>
<option>Loss</option>
<option>BE</option>
</select>

<label>Notas</label>
<textarea id="notes"></textarea>

<button type="submit">Guardar Registro</button>

</form>


<div class="buttons">
<button id="download">Descargar registros</button>
</div>


<h2>Historial</h2>

<div id="tradeList"></div>

<script src="js/app.js"></script>

</body>
</html>
