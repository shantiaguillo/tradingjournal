<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trading Journal</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Trading Journal</h1>

<form id="tradeForm">

<input type="date" id="date">

<select id="direction">
<option>Long</option>
<option>Short</option>
</select>

<input type="number" id="entry" placeholder="Entry Price">
<input type="number" id="sl" placeholder="Stop Loss">
<input type="number" id="tp" placeholder="Take Profit">

<input type="number" id="risk" placeholder="Risk %">

<select id="result">
<option>Win</option>
<option>Loss</option>
<option>BE</option>
</select>

<textarea id="notes" placeholder="What did you learn"></textarea>

<button type="submit">Save Trade</button>

</form>

<h2>Trades</h2>

<table id="tradeTable">
<thead>
<tr>
<th>Date</th>
<th>Direction</th>
<th>Entry</th>
<th>SL</th>
<th>TP</th>
<th>Result</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script src="js/app.js"></script>

</body>
</html>
