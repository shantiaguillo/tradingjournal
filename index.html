<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Trading Journal</h1>

<button id="darkModeBtn"></button>

<form id="tradeForm">

<label>Símbolo
<input type="text" id="simbolo" required>
</label>

<label>Fecha
<input type="date" id="fecha" required>
</label>

<label>Hora
<input type="time" id="hora" required>
</label>

<label>Sesión
<select id="sesion">
<option>NY</option>
<option>Londres</option>
<option>Asia</option>
</select>
</label>

<label>Dirección
<select id="direccion">
<option>Long</option>
<option>Short</option>
</select>
</label>

<label>Entry
<input type="number" id="entry" step="0.0001">
</label>

<label>SL
<input type="number" id="sl" step="0.0001">
</label>

<label>TP
<input type="number" id="tp" step="0.0001">
</label>

<label>Risk %
<input type="number" id="risk">
</label>

<label>Resultado
<select id="resultado">
<option>Win</option>
<option>Loss</option>
<option>BE</option>
</select>
</label>

<button type="submit" class="fullbtn">Agregar Trade</button>

</form>

<button id="downloadPdfBtn" class="fullbtn">Descargar Registro PDF</button>

<h2>Historial de Trades</h2>

<table id="tradeTable">

<thead>
<tr>
<th>Símbolo</th>
<th>Fecha</th>
<th>Hora</th>
<th>Sesión</th>
<th>Dirección</th>
<th>Entry</th>
<th>SL</th>
<th>TP</th>
<th>Risk</th>
<th>Resultado</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<script src="js/app.js"></script>

</body>
</html>
